<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function fib(n) {
        if (n <= 1) {
          return n; // حالات الأساس
        }
        let a = 0,
          b = 1,
          c;
        for (let i = 2; i <= n; i++) {
          c = a + b; // حساب الرقم التالي في سلسلة فيبوناتشي
          a = b; // الانتقال إلى الرقم التالي
          b = c;
        }
        return b; // b يحتوي على الرقم n من سلسلة فيبوناتشي
      }

      // اختبار الدالة
      let n = 4; // مثال
      console.log(`Fibonacci of ${n} is ${fib(n)}`);
    </script>
  </body>
</html>
